services:
  backend:
    build: .
    environment:
      - PORT=80
      - ADDR=0.0.0.0
      - DB_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - CACHE_URL=redis://default:${CACHE_PASSWORD}@cache:6379/${CACHE_DB_NO}
    ports:
      - "${PORT}:80"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      # for migrations
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 0.5s
      retries: 10
  cache:
    image: redis:8.6-alpine
    command: redis-server --requirepass "${CACHE_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 0.5s
      retries: 10